# First-pass reproduction config.
# Values here are placeholders for the harness shape, not tuned settings.

models:
  - EleutherAI/pythia-14m
  - EleutherAI/pythia-31m
  - EleutherAI/pythia-70m

methods:
  - fp16
  - rtn_w4a16
  - awq_w4a16

dataset:
  eval: wikitext2
  calibration: pile_or_wikitext2_subset

quantization:
  weight_bits: 4
  activation_bits: 16
  group_size: 128
  symmetric: true

evaluation:
  seqlen: 2048
  stride: 2048
  batch_size: 1

calibration:
  samples: 128
  seqlen: 2048

output:
  path: results/table3_pythia.csv
